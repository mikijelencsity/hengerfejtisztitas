<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Az oldal nem található — Dióhéjas Szeleptisztítás Ózd</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{--paper:#f5f0e6;--ink:#241c12;--ink-dim:#71634f;--walnut:#8a5a2b;--walnut-hot:#a46c33;--disp:'Unbounded',sans-serif;--mono:'JetBrains Mono',monospace;--body:'Archivo',sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--paper);color:var(--ink);font-family:var(--body);min-height:100svh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px}
  h1{font-family:var(--disp);font-weight:900;font-size:clamp(2rem,6vw,4rem);text-transform:uppercase;letter-spacing:-.01em}
  h1 span{color:var(--walnut)}
  p{color:var(--ink-dim);margin-top:18px;font-size:1.05rem}
  a{display:inline-flex;margin-top:32px;font-family:var(--mono);font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--paper);background:var(--walnut);padding:16px 30px;text-decoration:none;transition:.25s}
  a:hover{background:var(--walnut-hot)}
</style>
</head>
<body>
  <div>
    <h1>404 — <span>elfogyott a levegő</span></h1>
    <p>Ez az oldal nem található. Talán elgépelted a címet, vagy a hivatkozás elavult.</p>
    <a href="/">Vissza a főoldalra ▸</a>
  </div>
</body>
</html>
