<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koncepció 6 — Nyolcszög keretes showcase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f5f0e6;--card:#faf6ee;--ink:#241c12;--ink-dim:#71634f;
  --walnut:#8a5a2b;--walnut-hot:#a46c33;--walnut-deep:#5c3a18;--line:rgba(36,28,18,.14);
  --mono:'JetBrains Mono',monospace;--disp:'Unbounded',sans-serif;--body:'Archivo',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--paper);color:var(--ink);font-family:var(--body)}
.badge{position:fixed;top:16px;left:16px;z-index:50;font-family:var(--mono);font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;background:var(--ink);color:var(--paper);padding:6px 12px;border-radius:20px}
header{height:100vh;position:relative;display:grid;grid-template-columns:1.1fr .9fr;align-items:center;overflow:hidden;padding:0 clamp(20px,4vw,60px)}
@media(max-width:900px){header{grid-template-columns:1fr;padding-top:70px}}
.hero-bg{position:absolute;inset:0;z-index:-2;background:
  radial-gradient(ellipse 70% 60% at 80% 15%,rgba(138,90,43,.16),transparent 60%),
  radial-gradient(ellipse 50% 50% at 10% 90%,rgba(138,90,43,.08),transparent 60%),
  var(--paper);}
.hero-grid{position:absolute;inset:0;z-index:-1;opacity:.5;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 70% at 65% 40%,#000 30%,transparent 75%);
  -webkit-mask-image:radial-gradient(ellipse 80% 70% at 65% 40%,#000 30%,transparent 75%);}
.hero-text{position:relative;z-index:1}
.hero-tag{display:inline-flex;align-items:center;gap:10px;font-family:var(--mono);font-size:.7rem;letter-spacing:.28em;text-transform:uppercase;color:var(--walnut);margin-bottom:clamp(16px,3vh,26px);border:1px solid rgba(138,90,43,.4);padding:8px 14px;width:fit-content}
.hero-tag::before{content:'';width:6px;height:6px;background:var(--walnut);border-radius:50%}
h1{font-family:var(--disp);font-weight:900;font-size:clamp(1.9rem,4.6vw,4.4rem);line-height:1.02;letter-spacing:-.015em;text-transform:uppercase;max-width:13ch}
h1 .amber{color:var(--walnut)}
.hero-sub{max-width:44ch;color:var(--ink-dim);margin-top:clamp(16px,2.6vh,24px);font-size:clamp(.88rem,1.2vw,1.05rem)}
.hero-sub strong{color:var(--ink);font-weight:600}
.hero-actions{display:flex;gap:14px;margin-top:clamp(22px,3.4vh,34px);flex-wrap:wrap}
.btn{font-family:var(--mono);font-size:.74rem;letter-spacing:.13em;text-transform:uppercase;font-weight:700;padding:15px 28px;text-decoration:none;transition:.25s;display:inline-flex;align-items:center;gap:10px}
.btn-solid{color:var(--paper);background:var(--walnut);clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px)}
.btn-solid:hover{background:var(--walnut-hot);gap:16px}
.btn-ghost{color:var(--ink);border:1px solid rgba(36,28,18,.3)}
.btn-ghost:hover{border-color:var(--walnut);color:var(--walnut)}
.showcase{position:relative;display:flex;align-items:center;justify-content:center;height:min(72vh,560px)}
.ring{position:absolute;border:1px solid rgba(138,90,43,.3);}
.ring-1{width:88%;height:88%;transform:rotate(45deg);}
.ring-2{width:104%;height:104%;transform:rotate(45deg);border-style:dashed;border-color:rgba(138,90,43,.2)}
.oct-frame{
  position:relative;width:78%;aspect-ratio:1/1;
  clip-path:polygon(30% 0%,70% 0%,100% 30%,100% 70%,70% 100%,30% 100%,0% 70%,0% 30%);
  box-shadow:0 30px 70px rgba(36,28,18,.22);
  border:3px solid var(--paper);
}
.oct-frame img{width:100%;height:100%;object-fit:cover;filter:saturate(1.05) contrast(1.05)}
.oct-tag{
  position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;
  background:var(--walnut);color:var(--paper);padding:8px 16px;white-space:nowrap;
  clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
}
.corner-dot{position:absolute;width:8px;height:8px;background:var(--walnut);border-radius:50%}
.cd-tl{top:6%;left:6%}.cd-br{bottom:6%;right:6%}
</style>
</head>
<body>
<div class="badge">6 / Nyolcszög keretes showcase</div>
<header>
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <div class="hero-text">
    <div class="hero-tag">Bontás nélküli technológia · Ózd</div>
    <h1>A motorod<br>megfullad<br>a <span class="amber">koksztól.</span></h1>
    <p class="hero-sub">Dióhéjas szívószelep-tisztítás <strong>GDI / TSI / TFSI</strong> és dízelmotorokhoz — hengerfej-bontás nélkül.</p>
    <div class="hero-actions">
      <a href="#" class="btn btn-solid">Kérj árajánlatot ▸</a>
      <a href="#" class="btn btn-ghost">Nézd meg az eredményt</a>
    </div>
  </div>
  <div class="showcase">
    <div class="ring ring-2"></div>
    <div class="ring ring-1"></div>
    <div class="oct-frame">
      <img src="../images/after-szelepek-tiszta.jpg" alt="Tiszta szívószelepek">
      <span class="corner-dot cd-tl"></span>
      <span class="corner-dot cd-br"></span>
      <div class="oct-tag">Dióhéjas tisztítás után</div>
    </div>
  </div>
</header>
</body>
</html>
