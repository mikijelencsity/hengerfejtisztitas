<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koncepció 9 — Műszaki rajz / blueprint keret</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f5f0e6;--card:#faf6ee;--ink:#241c12;--ink-dim:#71634f;
  --walnut:#8a5a2b;--walnut-hot:#a46c33;--line:rgba(36,28,18,.14);
  --mono:'JetBrains Mono',monospace;--disp:'Unbounded',sans-serif;--body:'Archivo',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--paper);color:var(--ink);font-family:var(--body)}
.badge{position:fixed;top:16px;left:16px;z-index:50;font-family:var(--mono);font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;background:var(--ink);color:var(--paper);padding:6px 12px;border-radius:20px}
header{height:100vh;position:relative;display:grid;grid-template-columns:1.05fr .95fr;align-items:center;overflow:hidden;padding:0 clamp(20px,4vw,60px)}
@media(max-width:900px){header{grid-template-columns:1fr;padding-top:70px}}
.hero-bg{position:absolute;inset:0;z-index:-2;background:var(--paper)}
.blueprint-grid{
  position:absolute;inset:0;z-index:-1;opacity:.55;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:28px 28px;
}
.blueprint-grid::after{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(138,90,43,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(138,90,43,.18) 1px,transparent 1px);
  background-size:140px 140px;
}
.hero-text{position:relative;z-index:1}
.hero-tag{display:inline-flex;align-items:center;gap:10px;font-family:var(--mono);font-size:.7rem;letter-spacing:.28em;text-transform:uppercase;color:var(--walnut);margin-bottom:clamp(16px,3vh,26px);border:1px solid rgba(138,90,43,.4);padding:8px 14px;width:fit-content}
.hero-tag::before{content:'';width:6px;height:6px;background:var(--walnut);border-radius:50%}
h1{font-family:var(--disp);font-weight:900;font-size:clamp(1.9rem,4.6vw,4.4rem);line-height:1.02;letter-spacing:-.015em;text-transform:uppercase;max-width:13ch}
h1 .amber{color:var(--walnut)}
.hero-sub{max-width:44ch;color:var(--ink-dim);margin-top:clamp(16px,2.6vh,24px);font-size:clamp(.88rem,1.2vw,1.05rem)}
.hero-sub strong{color:var(--ink);font-weight:600}
.hero-actions{display:flex;gap:14px;margin-top:clamp(22px,3.4vh,34px);flex-wrap:wrap}
.btn{font-family:var(--mono);font-size:.74rem;letter-spacing:.13em;text-transform:uppercase;font-weight:700;padding:15px 28px;text-decoration:none;transition:.25s;display:inline-flex;align-items:center;gap:10px}
.btn-solid{color:var(--paper);background:var(--walnut);clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px)}
.btn-solid:hover{background:var(--walnut-hot);gap:16px}
.btn-ghost{color:var(--ink);border:1px solid rgba(36,28,18,.3)}
.btn-ghost:hover{border-color:var(--walnut);color:var(--walnut)}
.blueprint-stage{position:relative;display:flex;align-items:center;justify-content:center;height:min(70vh,540px)}
.bp-frame{position:relative;width:80%;aspect-ratio:4/3.4;background:var(--card);border:1.5px solid var(--walnut);box-shadow:0 26px 60px rgba(36,28,18,.2)}
.bp-frame .ph{position:absolute;inset:16px;overflow:hidden}
.bp-frame img{width:100%;height:100%;object-fit:cover;filter:saturate(1.02) contrast(1.05)}
.corner{position:absolute;width:18px;height:18px;border-color:var(--walnut);border-style:solid;border-width:0}
.corner.tl{top:-1px;left:-1px;border-top-width:3px;border-left-width:3px}
.corner.tr{top:-1px;right:-1px;border-top-width:3px;border-right-width:3px}
.corner.bl{bottom:-1px;left:-1px;border-bottom-width:3px;border-left-width:3px}
.corner.br{bottom:-1px;right:-1px;border-bottom-width:3px;border-right-width:3px}
.dim-line{position:absolute;background:var(--walnut)}
.dim-h{height:1px;left:16px;right:16px;top:-14px}
.dim-h::before,.dim-h::after{content:'';position:absolute;top:-3px;width:1px;height:7px;background:var(--walnut)}
.dim-h::before{left:0}.dim-h::after{right:0}
.bp-label{
  position:absolute;top:-34px;left:16px;font-family:var(--mono);font-size:.62rem;letter-spacing:.14em;
  text-transform:uppercase;color:var(--walnut-hot);
}
.bp-tag{
  position:absolute;bottom:-16px;right:16px;font-family:var(--mono);font-size:.62rem;letter-spacing:.14em;
  text-transform:uppercase;background:var(--walnut);color:var(--paper);padding:7px 14px;
}
</style>
</head>
<body>
<div class="badge">9 / Műszaki rajz / blueprint keret</div>
<header>
  <div class="hero-bg"></div>
  <div class="blueprint-grid"></div>
  <div class="hero-text">
    <div class="hero-tag">Bontás nélküli technológia · Ózd</div>
    <h1>A motorod<br>megfullad<br>a <span class="amber">koksztól.</span></h1>
    <p class="hero-sub">Dióhéjas szívószelep-tisztítás <strong>GDI / TSI / TFSI</strong> és dízelmotorokhoz — hengerfej-bontás nélkül.</p>
    <div class="hero-actions">
      <a href="#" class="btn btn-solid">Kérj árajánlatot ▸</a>
      <a href="#" class="btn btn-ghost">Nézd meg az eredményt</a>
    </div>
  </div>
  <div class="blueprint-stage">
    <div class="bp-frame">
      <span class="bp-label">FIG. 01 — SZÍVÓCSATORNA</span>
      <div class="dim-line dim-h"></div>
      <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
      <div class="ph"><img src="../images/process-hengerfej-sor.jpg" alt="Hengerfej-sor"></div>
      <span class="bp-tag">Dokumentált folyamat</span>
    </div>
  </div>
</header>
</body>
</html>
