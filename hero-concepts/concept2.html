<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koncepció 2 — Split-screen előtte/utána</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f5f0e6;--card:#faf6ee;--ink:#241c12;--ink-dim:#71634f;
  --walnut:#8a5a2b;--walnut-hot:#a46c33;--line:rgba(36,28,18,.14);
  --mono:'JetBrains Mono',monospace;--disp:'Unbounded',sans-serif;--body:'Archivo',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--paper);color:var(--ink);font-family:var(--body)}
.badge{
  position:fixed;top:16px;left:16px;z-index:50;font-family:var(--mono);font-size:.66rem;
  letter-spacing:.16em;text-transform:uppercase;background:var(--ink);color:var(--paper);
  padding:6px 12px;border-radius:20px;
}
header{
  height:100vh;display:grid;grid-template-columns:1.1fr 1fr;position:relative;
}
@media(max-width:860px){header{grid-template-columns:1fr;grid-template-rows:1fr 40vh}}
.hero-text{
  display:flex;flex-direction:column;justify-content:center;padding:clamp(28px,5vw,72px);
  position:relative;z-index:1;overflow:hidden;
}
.hero-tag{
  display:inline-flex;align-items:center;gap:10px;font-family:var(--mono);font-size:.68rem;
  letter-spacing:.28em;text-transform:uppercase;color:var(--walnut);margin-bottom:clamp(14px,3vh,26px);
  border:1px solid rgba(138,90,43,.4);padding:8px 14px;width:fit-content;
}
.hero-tag::before{content:'';width:6px;height:6px;background:var(--walnut);border-radius:50%}
h1{
  font-family:var(--disp);font-weight:900;font-size:clamp(1.7rem,5.2vw,4rem);
  line-height:1.02;letter-spacing:-.015em;text-transform:uppercase;max-width:13ch;
}
h1 .amber{color:var(--walnut)}
.hero-sub{max-width:44ch;color:var(--ink-dim);margin-top:clamp(14px,2.4vh,22px);font-size:clamp(.85rem,1.2vw,1.02rem)}
.hero-sub strong{color:var(--ink);font-weight:600}
.hero-actions{display:flex;gap:14px;margin-top:clamp(20px,3vh,32px);flex-wrap:wrap}
.btn{
  font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;font-weight:700;
  padding:14px 24px;text-decoration:none;transition:.25s;display:inline-flex;align-items:center;gap:8px;
}
.btn-solid{color:var(--paper);background:var(--walnut);clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px)}
.btn-solid:hover{background:var(--walnut-hot)}
.btn-ghost{color:var(--ink);border:1px solid rgba(36,28,18,.3)}
.btn-ghost:hover{border-color:var(--walnut);color:var(--walnut)}
.hero-visual{position:relative;overflow:hidden;display:grid;grid-template-rows:1fr 1fr}
.hv-half{position:relative;overflow:hidden}
.hv-half img{width:100%;height:100%;object-fit:cover;filter:saturate(.95)}
.hv-tag{
  position:absolute;top:14px;left:14px;font-family:var(--mono);font-size:.62rem;
  letter-spacing:.16em;text-transform:uppercase;padding:6px 11px;color:var(--paper);
  background:rgba(36,28,18,.55);backdrop-filter:blur(4px);
}
.hv-divider{position:absolute;left:0;right:0;top:50%;height:2px;background:var(--walnut);z-index:2;transform:translateY(-1px)}
</style>
</head>
<body>
<div class="badge">2 / Split-screen előtte–utána</div>
<header>
  <div class="hero-text">
    <div class="hero-tag">Bontás nélküli technológia · Ózd</div>
    <h1>A motorod<br>megfullad<br>a <span class="amber">koksztól.</span></h1>
    <p class="hero-sub">Dióhéjas szívószelep-tisztítás <strong>GDI / TSI / TFSI</strong> és dízelmotorokhoz — hengerfej-bontás nélkül.</p>
    <div class="hero-actions">
      <a href="#" class="btn btn-solid">Kérj árajánlatot ▸</a>
      <a href="#" class="btn btn-ghost">Nézd meg az eredményt</a>
    </div>
  </div>
  <div class="hero-visual">
    <div class="hv-half"><span class="hv-tag">Előtte</span><img src="../images/before-koksz-szivocsatorna.jpg" alt="Kokszos szívócsatorna"></div>
    <div class="hv-half"><span class="hv-tag">Utána</span><img src="../images/after-csatorna-tiszta.jpg" alt="Tiszta szívócsatorna"></div>
    <div class="hv-divider"></div>
  </div>
</header>
</body>
</html>
