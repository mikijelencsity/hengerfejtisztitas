<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koncepció 3 — Full-bleed háttérfotó</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f5f0e6;--ink:#241c12;--walnut:#8a5a2b;--walnut-hot:#a46c33;
  --mono:'JetBrains Mono',monospace;--disp:'Unbounded',sans-serif;--body:'Archivo',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#000;color:var(--paper);font-family:var(--body)}
.badge{
  position:fixed;top:16px;left:16px;z-index:50;font-family:var(--mono);font-size:.66rem;
  letter-spacing:.16em;text-transform:uppercase;background:rgba(245,240,230,.9);color:var(--ink);
  padding:6px 12px;border-radius:20px;
}
header{
  height:100vh;position:relative;display:flex;flex-direction:column;justify-content:flex-end;
  padding:clamp(24px,4vw,64px);overflow:hidden;
}
.hero-bg{position:absolute;inset:0;z-index:-2}
.hero-bg img{width:100%;height:100%;object-fit:cover;filter:saturate(.9) contrast(1.05)}
.hero-scrim{
  position:absolute;inset:0;z-index:-1;
  background:linear-gradient(0deg,rgba(10,7,3,.92) 0%,rgba(10,7,3,.55) 42%,rgba(10,7,3,.15) 70%,transparent 100%);
}
.stat-badges{position:absolute;top:clamp(20px,4vh,40px);right:clamp(20px,4vw,56px);display:flex;gap:10px;z-index:1}
.stat-badge{
  font-family:var(--mono);text-align:center;background:rgba(10,7,3,.55);backdrop-filter:blur(6px);
  border:1px solid rgba(245,240,230,.25);padding:10px 14px;border-radius:8px;
}
.stat-badge b{display:block;font-family:var(--disp);font-size:1.1rem;color:var(--walnut-hot)}
.stat-badge span{font-size:.55rem;letter-spacing:.14em;text-transform:uppercase;opacity:.75}
@media(max-width:640px){.stat-badges{display:none}}
.hero-tag{
  display:inline-flex;align-items:center;gap:10px;font-family:var(--mono);font-size:.68rem;
  letter-spacing:.28em;text-transform:uppercase;color:var(--walnut-hot);margin-bottom:clamp(16px,3vh,26px);
  border:1px solid rgba(245,240,230,.3);padding:8px 14px;width:fit-content;
}
.hero-tag::before{content:'';width:6px;height:6px;background:var(--walnut-hot);border-radius:50%}
h1{
  font-family:var(--disp);font-weight:900;font-size:clamp(2rem,6.4vw,5.2rem);
  line-height:1.0;letter-spacing:-.015em;text-transform:uppercase;max-width:14ch;color:var(--paper);
}
h1 .amber{color:var(--walnut-hot)}
.hero-sub{max-width:50ch;color:rgba(245,240,230,.78);margin-top:clamp(16px,2.6vh,24px);font-size:clamp(.9rem,1.3vw,1.05rem)}
.hero-sub strong{color:var(--paper);font-weight:600}
.hero-actions{display:flex;gap:14px;margin-top:clamp(22px,3.4vh,34px);flex-wrap:wrap}
.btn{
  font-family:var(--mono);font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;font-weight:700;
  padding:15px 26px;text-decoration:none;transition:.25s;display:inline-flex;align-items:center;gap:10px;
}
.btn-solid{color:var(--paper);background:var(--walnut);clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px)}
.btn-solid:hover{background:var(--walnut-hot)}
.btn-ghost{color:var(--paper);border:1px solid rgba(245,240,230,.4)}
.btn-ghost:hover{border-color:var(--walnut-hot);color:var(--walnut-hot)}
</style>
</head>
<body>
<div class="badge">3 / Full-bleed háttérfotó</div>
<header>
  <div class="hero-bg"><img src="../images/process-motorter-bmw.jpg" alt="Motortér"></div>
  <div class="hero-scrim"></div>
  <div class="stat-badges">
    <div class="stat-badge"><b>100%</b><span>lerakódás el</span></div>
    <div class="stat-badge"><b>~4 óra</b><span>munkaidő</span></div>
    <div class="stat-badge"><b>BIO</b><span>granulátum</span></div>
  </div>
  <div class="hero-tag">Bontás nélküli technológia · Ózd</div>
  <h1>A motorod<br>megfullad<br>a <span class="amber">koksztól.</span></h1>
  <p class="hero-sub">Dióhéjas szívószelep-tisztítás <strong>GDI / TSI / TFSI</strong> és dízelmotorokhoz — hengerfej-bontás nélkül.</p>
  <div class="hero-actions">
    <a href="#" class="btn btn-solid">Kérj árajánlatot ▸</a>
    <a href="#" class="btn btn-ghost">Nézd meg az eredményt</a>
  </div>
</header>
</body>
</html>
